<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>우리가 함께하는 새로운 시작</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            /* 갤럭시 S24 punch-hole/상단바 safe-area 대응 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 세로 방향 고정 */
            touch-action: none;
        }
        canvas {
            display: block;
            /* 터치 하이라이트 제거 */
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
    </style>
</head>
<body>

    <!-- 설정 (에셋 경로, 대사, 오브젝트 위치) -->
    <script src="src/config.js"></script>

    <!-- 유틸 -->
    <script src="src/utils/DriveUrl.js"></script>
    <script src="src/utils/AssetFallback.js"></script>

    <!-- 시스템 -->
    <script src="src/systems/DialogSystem.js"></script>
    <script src="src/systems/NavigationUI.js"></script>

    <!-- 씬 (선언 순서 유지) -->
    <script src="src/scenes/BootScene.js"></script>
    <script src="src/scenes/QuizScene.js"></script>
    <script src="src/scenes/PreloadScene.js"></script>
    <script src="src/scenes/RoomScene.js"></script>
    <script src="src/scenes/KitchenScene.js"></script>
    <script src="src/scenes/LivingScene.js"></script>
    <script src="src/scenes/EndingScene.js"></script>

    <!-- Phaser 초기화 -->
    <script src="src/main.js"></script>

</body>
</html>
